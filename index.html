<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gestor de Demandas — Apex · Squad AAA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --apex:#0055A5;--apex-dk:#003d7a;--apex-lt:#e8f0fb;--apex-mid:#4a90d9;
  --white:#fff;--gray-50:#f8f9fc;--gray-100:#eef1f7;--gray-200:#d8dde8;
  --gray-400:#8e97ad;--gray-700:#3a4157;--gray-900:#1a1f2e;
  --danger:#e03c3c;--danger-lt:#fdf0f0;--warn:#c97c1a;--warn-lt:#fdf4e7;
  --ok:#1a8a5a;--ok-lt:#e8f7f1;
  --font:'Outfit',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--r-lg:14px;
  --sh:0 2px 12px rgba(0,85,165,.08);--sh-md:0 4px 24px rgba(0,85,165,.13);
}
html,body{height:100%;background:var(--gray-50);font-family:var(--font);color:var(--gray-900);}
 
/* ── LOCK ── */
#lock{position:fixed;inset:0;z-index:999;background:var(--apex-dk);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.lbg{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.lbg-d{position:absolute;width:420px;height:420px;background:rgba(255,255,255,.03);transform:rotate(45deg);border-radius:40px;top:-100px;right:-100px;}
.lbg-d2{position:absolute;width:260px;height:260px;background:rgba(255,255,255,.04);transform:rotate(45deg);border-radius:24px;bottom:-60px;left:-50px;}
.lcard{position:relative;z-index:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:2.25rem 2rem 1.75rem;width:min(340px,92vw);display:flex;flex-direction:column;align-items:center;animation:lockIn .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes lockIn{from{opacity:0;transform:translateY(24px) scale(.96)}to{opacity:1;transform:none}}
.l-logo{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;}
.l-dia{width:40px;height:40px;background:white;transform:rotate(45deg);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.l-dia-in{width:16px;height:16px;background:var(--apex);border-radius:3px;}
.l-word{font-size:24px;font-weight:700;color:white;letter-spacing:-.3px;}
.l-squad{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.5);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:3px 12px;border-radius:20px;margin-bottom:1.5rem;}
.l-title{font-size:17px;font-weight:600;color:white;margin-bottom:5px;}
.l-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:1.25rem;}
.l-inp-wrap{position:relative;width:100%;margin-bottom:8px;}
.l-inp{width:100%;padding:12px 44px 12px 14px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:var(--r);font-size:15px;font-family:var(--font);color:white;outline:none;transition:border-color .2s;}
.l-inp::placeholder{color:rgba(255,255,255,.35);}
.l-inp:focus{border-color:rgba(255,255,255,.5);}
.l-inp.err{border-color:#ff6b6b;animation:shake .35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.l-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);font-size:16px;padding:4px;}
.l-btn{width:100%;padding:13px;background:white;color:var(--apex);border:none;border-radius:var(--r);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;margin-top:4px;transition:all .15s;}
.l-btn:hover{background:var(--apex-lt);}
.l-err{font-size:12px;color:#ff8f8f;text-align:center;min-height:18px;margin-top:2px;}
 
/* ── APP ── */
#app{display:none;}
#app.on{display:block;}
 
/* TOPBAR */
.topbar{background:white;border-bottom:1px solid var(--gray-200);height:52px;padding:0 1rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,85,165,.07);}
.a-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.a-dia{width:28px;height:28px;background:var(--apex);transform:rotate(45deg);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.a-dia-in{width:12px;height:12px;background:white;border-radius:2px;}
.a-word{font-size:18px;font-weight:700;color:var(--apex);letter-spacing:-.3px;}
.tb-div{width:1px;height:20px;background:var(--gray-200);}
.tb-title{font-size:12px;font-weight:500;color:var(--gray-400);white-space:nowrap;}
.tb-squad{margin-left:auto;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--apex);background:var(--apex-lt);border:1px solid rgba(0,85,165,.2);padding:3px 10px;border-radius:20px;white-space:nowrap;}
 
/* BOTTOM NAV (mobile) */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--gray-200);z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.bottom-nav .bnav-inner{display:flex;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;border:none;background:none;cursor:pointer;gap:3px;transition:all .15s;}
.bnav-btn .bn-icon{font-size:20px;}
.bnav-btn .bn-label{font-size:10px;font-weight:600;color:var(--gray-400);font-family:var(--font);}
.bnav-btn.active .bn-label{color:var(--apex);}
.bnav-btn.active .bn-icon{transform:scale(1.1);}
 
/* DESKTOP LAYOUT */
.layout{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 52px);}
.sidebar{background:white;border-right:1px solid var(--gray-200);padding:1.25rem 0;display:flex;flex-direction:column;gap:3px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 1.25rem;font-size:13px;font-weight:500;color:var(--gray-400);cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:3px solid transparent;transition:all .15s;font-family:var(--font);}
.nav-item:hover{background:var(--gray-50);color:var(--gray-700);}
.nav-item.active{color:var(--apex);background:var(--apex-lt);border-left-color:var(--apex);font-weight:600;}
.nav-icon{font-size:15px;width:18px;text-align:center;}
.nav-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-400);padding:.75rem 1.25rem .2rem;}
.sb-foot{margin-top:auto;padding:.75rem 1.25rem;border-top:1px solid var(--gray-100);}
.sb-squad{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--apex);opacity:.7;}
 
/* MAIN */
.main{padding:1.25rem;overflow-y:auto;padding-bottom:2rem;}
.panel{display:none;animation:fadeIn .2s ease;}
.panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
 
/* CARD */
.card{background:white;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:1.25rem;box-shadow:var(--sh);margin-bottom:1rem;}
.card-title{font-size:14px;font-weight:600;color:var(--gray-700);margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.badge{background:var(--apex);color:white;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;}
 
/* INPUT */
.inp-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--apex);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.pulse{width:7px;height:7px;background:var(--apex);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
textarea.dem-in{width:100%;min-height:90px;border:1.5px solid var(--gray-200);border-radius:var(--r);padding:11px;font-size:14px;font-family:var(--font);color:var(--gray-900);background:var(--gray-50);resize:none;outline:none;line-height:1.6;transition:border-color .15s;-webkit-appearance:none;}
textarea.dem-in:focus{border-color:var(--apex);background:white;}
textarea.dem-in::placeholder{color:var(--gray-400);}
.corr-box{background:var(--apex-lt);border:1.5px solid var(--apex-mid);border-radius:var(--r);padding:11px 13px;margin-top:10px;display:none;}
.corr-box.show{display:block;}
.clabel{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--apex);opacity:.8;margin-bottom:5px;}
.ctext{font-size:13px;color:var(--apex-dk);line-height:1.65;}
.controls{display:flex;align-items:center;gap:8px;margin-top:11px;flex-wrap:wrap;}
.btn-p{background:var(--apex);color:white;border:none;border-radius:var(--r);padding:10px 16px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent;}
.btn-p:active{opacity:.85;transform:scale(.98);}
.btn-p:disabled{opacity:.5;cursor:not-allowed;}
.btn-s{background:white;color:var(--gray-700);border:1px solid var(--gray-200);border-radius:var(--r);padding:10px 14px;font-size:13px;font-family:var(--font);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn-s:active{background:var(--gray-50);}
.ai-st{font-size:12px;padding:4px 0;display:none;font-weight:500;}
.ai-st.show{display:block;}
.ai-st.ok{color:var(--ok);}
.ai-st.err{color:var(--danger);}
 
/* FORM */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:1.25rem 0 1rem;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg.full{grid-column:span 2;}
.fg label{font-size:10px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;}
.fg input,.fg select{font-family:var(--font);font-size:14px;border:1.5px solid var(--gray-200);border-radius:var(--r);padding:10px 11px;background:var(--gray-50);color:var(--gray-900);outline:none;transition:border-color .15s;-webkit-appearance:none;width:100%;}
.fg input:focus,.fg select:focus{border-color:var(--apex);background:white;}
.dh{font-size:11px;color:var(--apex);margin-top:3px;min-height:14px;font-weight:500;}
.dh.err{color:var(--danger);}
 
/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem;}
.sc{background:white;border:1px solid var(--gray-200);border-radius:var(--r);padding:.875rem 1rem;box-shadow:var(--sh);}
.sc.acc{background:var(--apex);border-color:var(--apex);}
.sc.acc .sl{color:rgba(255,255,255,.75);}
.sc.acc .sv{color:white;}
.sl{font-size:11px;color:var(--gray-400);margin-bottom:3px;font-weight:500;}
.sv{font-size:24px;font-weight:700;color:var(--gray-900);font-family:var(--mono);}
 
/* FILTERS */
.fbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.chip{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--gray-200);background:white;color:var(--gray-400);cursor:pointer;font-family:var(--font);font-weight:500;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.chip.active{background:var(--apex);color:white;border-color:var(--apex);}
.lhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.llbl{font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;}
.lcnt{background:var(--apex-lt);color:var(--apex);font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;}
 
/* TASKS */
.tlist{display:flex;flex-direction:column;gap:8px;}
.tc{background:white;border:1px solid var(--gray-200);border-radius:var(--r);padding:12px 13px;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--sh);transition:border-color .15s;}
.tc.done{opacity:.45;}
.tc.done .tname{text-decoration:line-through;}
.chk{width:18px;height:18px;min-width:18px;border:2px solid var(--gray-200);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s;flex-shrink:0;}
.chk.checked{background:var(--apex);border-color:var(--apex);}
.chk.checked::after{content:'';display:block;width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);}
.tbody{flex:1;min-width:0;}
.ttop{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px;}
.tname{font-size:14px;font-weight:600;color:var(--gray-900);}
.bpill{font-size:11px;background:var(--apex-lt);color:var(--apex);padding:2px 7px;border-radius:20px;font-weight:600;}
.tmeta{display:flex;gap:10px;font-size:12px;color:var(--gray-400);}
.tdesc{font-size:12px;color:var(--gray-400);margin-top:3px;line-height:1.5;}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.ph{background:var(--danger);}.pm{background:var(--warn);}.pl{background:var(--ok);}
.tag-o{font-size:10px;background:var(--danger-lt);color:var(--danger);padding:2px 6px;border-radius:4px;font-weight:600;}
.tag-t{font-size:10px;background:var(--warn-lt);color:var(--warn);padding:2px 6px;border-radius:4px;font-weight:600;}
.del-btn{background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:15px;padding:3px 5px;border-radius:5px;flex-shrink:0;}
.del-btn:active{background:var(--danger-lt);color:var(--danger);}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--gray-400);font-size:13px;}
.empty-i{font-size:28px;margin-bottom:8px;}
 
/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-ml{font-size:15px;font-weight:700;color:var(--gray-900);}
.cal-btn{background:white;border:1px solid var(--gray-200);border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--gray-700);-webkit-tap-highlight-color:transparent;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--gray-400);text-align:center;padding:5px 0;}
.cal-day{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:4px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.cal-day:active{background:var(--gray-100);}
.cal-day.today{border-color:var(--apex);}
.cal-day.selected{background:var(--apex-lt);border-color:var(--apex);}
.cal-day.om .dn{opacity:.3;}
.dn{font-size:11px;font-weight:600;color:var(--gray-900);}
.cal-day.today .dn{color:var(--apex);font-weight:800;}
.tdots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:2px;}
.tdot{width:4px;height:4px;border-radius:50%;}
.cal-dt{margin-top:1rem;}
.cal-dt h3{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--gray-900);}
 
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite;}
 
/* ── RESPONSIVE ── */
@media(max-width:640px){
  .layout{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .bottom-nav{display:block;}
  .main{padding:1rem;padding-bottom:80px;}
  .fgrid{grid-template-columns:1fr;}
  .fg.full{grid-column:span 1;}
  .stats{grid-template-columns:repeat(2,1fr);}
  .tb-title{display:none;}
  .tb-div{display:none;}
  .controls{flex-direction:column;align-items:stretch;}
  .btn-p,.btn-s{width:100%;justify-content:center;}
  .fbar{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
  .fbar::-webkit-scrollbar{display:none;}
  .topbar{padding:0 .875rem;}
}
@media(min-width:641px){
  .stats{grid-template-columns:repeat(4,1fr);}
}
 
/* ── MOBILE ── */
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;flex-direction:column;gap:5px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--apex-blue);border-radius:2px;transition:all 0.3s;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:49;}
.sidebar-overlay.show{display:block;}
 
@media(max-width:768px){
  .hamburger{display:flex;}
  .topbar{padding:0 1rem;}
  .topbar-squad{font-size:10px;padding:3px 8px;}
  
  .layout{grid-template-columns:1fr;}
  
  .sidebar{
    position:fixed;left:-240px;top:56px;bottom:0;z-index:50;
    width:240px;transition:left 0.3s ease;box-shadow:4px 0 20px rgba(0,0,0,0.15);
  }
  .sidebar.open{left:0;}
  
  .main{padding:1rem;}
  
  .stats-row{grid-template-columns:1fr 1fr;gap:8px;}
  .s-val{font-size:20px;}
  
  .form-grid{grid-template-columns:1fr;}
  .fg.full{grid-column:span 1;}
  
  .lock-card{width:calc(100vw - 2rem);padding:2rem 1.5rem 1.5rem;}
  .lock-title{font-size:16px;}
  
  textarea.dem-input{min-height:80px;font-size:16px;}
  .fg input,.fg select{font-size:16px;padding:11px 12px;}
  
  .task-name{font-size:13px;}
  .controls{gap:6px;}
  .btn-primary,.btn-sec{padding:10px 14px;font-size:13px;}
  .btn-primary[style]{padding:13px!important;}
  
  .topbar-title{display:none;}
  
  .cal-grid{gap:2px;}
  .day-num{font-size:11px;}
}
 
@media(max-width:380px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .topbar-squad{display:none;}
}
</style>
</head>
<body>
 
<!-- LOCK -->
<div id="lock">
  <div class="lbg"><div class="lbg-d"></div><div class="lbg-d2"></div></div>
  <div class="lcard">
    <div class="l-logo">
      <div class="l-dia"><div class="l-dia-in"></div></div>
      <span class="l-word">APEX</span>
    </div>
    <div class="l-squad">Squad AAA</div>
    <div class="l-title">Gestor de Demandas</div>
    <div class="l-sub">Digite a senha para acessar</div>
    <div class="l-inp-wrap">
      <input class="l-inp" type="password" id="pwd" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')tryUnlock()">
      <button class="l-eye" onclick="togglePwd()">👁</button>
    </div>
    <div class="l-err" id="lerr"></div>
    <button class="l-btn" onclick="tryUnlock()">Entrar</button>
  </div>
</div>
 
<!-- APP -->
<div id="app">
  <div class="topbar">
    <a class="a-logo" href="#">
      <div class="a-dia"><div class="a-dia-in"></div></div>
      <span class="a-word">APEX</span>
    </a>
    <div class="tb-div"></div>
    <span class="tb-title">Gestor de Demandas</span>
    <div class="tb-squad">Squad AAA</div>
  </div>
 
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="layout">
    <nav class="sidebar">
      <div class="nav-sec">Menu</div>
      <button class="nav-item active" onclick="switchTab('input')"><span class="nav-icon">＋</span> Nova Demanda</button>
      <button class="nav-item" onclick="switchTab('tasks')"><span class="nav-icon">☑</span> Minhas Tarefas</button>
      <button class="nav-item" onclick="switchTab('calendar')"><span class="nav-icon">📅</span> Agenda</button>
      <div class="sb-foot"><div class="sb-squad">◆ Squad AAA</div></div>
    </nav>
 
    <main class="main">
      <!-- NOVA DEMANDA -->
      <div class="panel active" id="panel-input">
        <div class="card">
          <div class="card-title">Nova Demanda <span class="badge">IA</span></div>
          <div class="inp-label"><div class="pulse"></div> Cole ou descreva sua demanda</div>
          <textarea class="dem-in" id="ai-text" placeholder="Escreva como quiser — com erros, abreviações, minúsculas...&#10;Ex: dudu pediu pra assim qe sair a stvm do wilson calmon excluuir a kconta vazia. ate terca durante odia prioridade baixa"></textarea>
          <div class="corr-box" id="corr-box"><div class="clabel">Texto corrigido pela IA</div><div class="ctext" id="corr-text"></div></div>
          <div class="ai-st" id="ai-st"></div>
          <div class="controls">
            <button class="btn-p" id="main-btn" onclick="corrigir()">Corrigir e extrair ↗</button>
            <button class="btn-s" onclick="clearIn()">Limpar</button>
          </div>
          <div class="fgrid">
            <div class="fg full"><label>Título da demanda</label><input type="text" id="f-title" placeholder="Preenchido automaticamente"></div>
            <div class="fg"><label>Banker responsável</label><input type="text" id="f-banker" placeholder="Ex: Dudu"></div>
            <div class="fg">
              <label>Prazo</label>
              <input type="text" id="f-date-text" placeholder="Ex: terça, amanhã, dia 15..." oninput="parseDt(this.value)">
              <div class="dh" id="dh"></div>
              <input type="hidden" id="f-date">
            </div>
            <div class="fg">
              <label>Horário</label>
              <input type="text" id="f-time-text" placeholder="Ex: 17h, fim do dia..." oninput="parseTm(this.value)">
              <div class="dh" id="th"></div>
              <input type="hidden" id="f-time">
            </div>
            <div class="fg"><label>Prioridade</label><select id="f-priority"><option value="high">Alta</option><option value="mid" selected>Média</option><option value="low">Baixa</option></select></div>
            <div class="fg full"><label>Descrição</label><input type="text" id="f-desc" placeholder="Observações adicionais..."></div>
          </div>
          <button class="btn-p" onclick="addTask()" style="width:100%;justify-content:center;padding:12px;">Adicionar à lista</button>
        </div>
      </div>
 
      <!-- TAREFAS -->
      <div class="panel" id="panel-tasks">
        <div class="stats">
          <div class="sc acc"><div class="sl">Total</div><div class="sv" id="s-total">0</div></div>
          <div class="sc"><div class="sl">Pendentes</div><div class="sv" id="s-pend">0</div></div>
          <div class="sc"><div class="sl">Concluídas</div><div class="sv" id="s-done">0</div></div>
          <div class="sc"><div class="sl">Vence hoje</div><div class="sv" id="s-tod">0</div></div>
        </div>
        <div class="card">
          <div class="fbar">
            <button class="chip active" onclick="setF('all',this)">Todas</button>
            <button class="chip" onclick="setF('pending',this)">Pendentes</button>
            <button class="chip" onclick="setF('done',this)">Concluídas</button>
            <button class="chip" onclick="setF('today',this)">Hoje</button>
            <button class="chip" onclick="setF('overdue',this)">Atrasadas</button>
          </div>
          <div class="lhdr"><span class="llbl">Demandas</span><span class="lcnt" id="lcnt">0 itens</span></div>
          <div class="tlist" id="tlist"></div>
        </div>
      </div>
 
      <!-- AGENDA -->
      <div class="panel" id="panel-calendar">
        <div class="card">
          <div class="cal-nav">
            <button class="cal-btn" onclick="chMonth(-1)">&#8249;</button>
            <span class="cal-ml" id="cal-ml"></span>
            <button class="cal-btn" onclick="chMonth(1)">&#8250;</button>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
          <div class="cal-dt" id="cal-dt"></div>
        </div>
      </div>
    </main>
  </div>
 
  <!-- BOTTOM NAV (mobile) -->
  <nav class="bottom-nav">
    <div class="bnav-inner">
      <button class="bnav-btn active" id="bn-input" onclick="switchTab('input')">
        <span class="bn-icon">＋</span><span class="bn-label">Nova</span>
      </button>
      <button class="bnav-btn" id="bn-tasks" onclick="switchTab('tasks')">
        <span class="bn-icon">☑</span><span class="bn-label">Tarefas</span>
      </button>
      <button class="bnav-btn" id="bn-calendar" onclick="switchTab('calendar')">
        <span class="bn-icon">📅</span><span class="bn-label">Agenda</span>
      </button>
    </div>
  </nav>
</div>
 
<script>
const KEY='apex_squad_aaa_v1';
let tasks=[],fil='all',calY,calM,selD=null;
 
function pad(n){return String(n).padStart(2,'0');}
function todayS(){const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function isOvd(t){return!t.done&&t.date&&t.date<todayS();}
function isTod(t){return t.date===todayS();}
 
// LOCK
const SENHA='001122';
function tryUnlock(){
  const v=document.getElementById('pwd').value;
  const e=document.getElementById('lerr');
  const i=document.getElementById('pwd');
  if(v===SENHA){
    document.getElementById('lock').style.cssText='animation:fadeOut .4s ease forwards;';
    setTimeout(()=>{document.getElementById('lock').style.display='none';document.getElementById('app').className='on';load();},380);
  }else{
    e.textContent='Senha incorreta. Tente novamente.';
    i.classList.add('err');i.value='';
    setTimeout(()=>i.classList.remove('err'),500);
  }
}
function togglePwd(){const i=document.getElementById('pwd');i.type=i.type==='password'?'text':'password';}
document.getElementById('pwd').focus();
 
// STORAGE
// ── Shared storage — todos do Squad AAA veem as mesmas tarefas ──
const SHARED_URL='https://jsonblob.com/api/jsonBlob/019d53b4-74b9-7e6f-bf9f-30db725301f5';
 
async function load(){
  try{const r=localStorage.getItem(KEY);if(r)tasks=JSON.parse(r);}catch(e){tasks=[];}
  await syncFromServer();
  setInterval(syncFromServer,15000);
}
 
async function syncFromServer(){
  try{
    const r=await fetch(SHARED_URL,{headers:{'Accept':'application/json'}});
    if(r.ok){
      const d=await r.json();
      const serverTasks=Array.isArray(d)?d:[];
      if(JSON.stringify(serverTasks)!==JSON.stringify(tasks)){
        tasks=serverTasks;
        try{localStorage.setItem(KEY,JSON.stringify(tasks));}catch(e){}
        renderAll();
      }
    }
  }catch(e){}
}
 
async function save(){
  try{localStorage.setItem(KEY,JSON.stringify(tasks));}catch(e){}
  try{
    await fetch(SHARED_URL,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(tasks)
    });
  }catch(e){}
}
 
// IA
async function corrigir(){
  const raw=document.getElementById('ai-text').value.trim();
  if(!raw){alert('Cole uma demanda primeiro.');return;}
  const btn=document.getElementById('main-btn');
  const st=document.getElementById('ai-st');
  btn.disabled=true;btn.innerHTML='<span class="spin">⟳</span> Corrigindo...';
  st.textContent='Corrigindo e extraindo...';st.className='ai-st show ok';
  document.getElementById('corr-box').className='corr-box';
 
  const now=new Date();
  const dias=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
  const prompt=`Você é um assistente de gestão de tarefas bancárias. Analise o texto e retorne APENAS JSON válido, sem texto extra.
 
Hoje: ${todayS()} (${dias[now.getDay()]})
 
Texto: "${raw}"
 
JSON:
{
  "texto_corrigido": "reescreva completamente correto em português formal. Corrija: ortografia, erros de digitação (qe→que, kconta→conta, excluuir→excluir, odia→o dia), nomes próprios com inicial maiúscula em CADA palavra (wilson calmon→Wilson Calmon, dudu→Dudu), siglas em MAIÚSCULO (stvm→STVM, cpf→CPF), início de frases com maiúscula, pontuação, abreviações (pra→para, ate→até, tbm→também, vc→você)",
  "titulo": "ação principal em até 70 chars",
  "banker": "nome do solicitante com maiúsculas, vazio se não houver",
  "data_texto": "expressão de data: amanhã, terça, dia 15, 10/04 — vazio se não houver",
  "hora_texto": "expressão de hora: 17h, fim do dia, durante o dia — vazio se não houver",
  "prioridade": "low se baixa/sem pressa, high se urgente/asap, mid padrão"
}`;
 
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const txt=(data.content||[]).map(i=>i.text||'').join('').trim().replace(/^```json\s*/,'').replace(/^```/,'').replace(/```$/,'').trim();
    preencher(JSON.parse(txt));
    st.textContent='✅ Texto corrigido e campos preenchidos!';st.className='ai-st show ok';
  }catch(e){
    const c=corLocal(raw);const f=extrai(c);f.texto_corrigido=c;
    preencher(f);
    st.textContent='✅ Correção local aplicada.';st.className='ai-st show ok';
  }
  btn.disabled=false;btn.innerHTML='Corrigir e extrair ↗';
}
 
function preencher(d){
  document.getElementById('corr-text').textContent=d.texto_corrigido||'';
  document.getElementById('corr-box').className='corr-box show';
  document.getElementById('f-title').value=d.titulo||'';
  document.getElementById('f-banker').value=d.banker||'';
  document.getElementById('f-priority').value=d.prioridade||'mid';
  document.getElementById('f-desc').value=d.texto_corrigido||'';
  const dt=d.data_texto||'',hr=d.hora_texto||'';
  document.getElementById('f-date-text').value=dt;document.getElementById('f-time-text').value=hr;
  parseDt(dt);parseTm(hr);
}
 
function corLocal(s){
  let r=s.replace(/[\\\/]+([A-Za-záàãâéêíóõôúçÁÀÃÂÉÊÍÓÕÔÚÇ])/g,'$1');
  r=r.replace(/\b(stvm|cpf|cnpj|rg|cnh|cdb|lci|lca|ted|doc|pix)\b/gi,m=>m.toUpperCase());
  const t=[[/\bqe\b/gi,'que'],[/\bkconta\b/gi,'conta'],[/\bexcluuir\b/gi,'excluir'],[/\bodia\b/gi,'o dia'],[/\bpra\b/gi,'para'],[/\bate\b/gi,'até'],[/\btbm\b/gi,'também'],[/\bvc\b/gi,'você'],[/\bn\b/gi,'não'],[/\bq\b/gi,'que'],[/\bmt\b/gi,'muito']];
  for(const[rx,rep]of t)r=r.replace(rx,rep);
  r=r.replace(/(^|[.!?]\s+)([a-záàãâéêíóõôúç])/gi,(_,p,c)=>p+c.toUpperCase());
  r=r.charAt(0).toUpperCase()+r.slice(1);
  if(!/[.!?]$/.test(r.trim()))r=r.trim()+'.';
  return r;
}
function extrai(text){
  const sl=text.toLowerCase();
  let banker='';
  const cm=text.match(/^([A-ZÀ-Úa-zà-ú]{2,20})(?:\s*:|(?=\s+pediu|\s+solicitou))/i);
  if(cm)banker=cm[1].trim().replace(/\b\w/g,c=>c.toUpperCase());
  let priority='mid';
  if(/prioridade\s+baixa|sem\s+pressa/.test(sl))priority='low';
  else if(/urgente|urgência|asap|prioridade\s+alta/.test(sl))priority='high';
  let dt='';
  const dr=[/pra?\s+(amanh[ãa])/i,/até\s+(amanh[ãa])/i,/pra?\s+((?:segunda|terça|quarta|quinta|sexta|sábado|domingo)(?:[\s-]?feira)?)/i,/até\s+((?:segunda|terça|quarta|quinta|sexta|sábado|domingo)(?:[\s-]?feira)?)/i,/para\s+((?:segunda|terça|quarta|quinta|sexta|sábado|domingo)(?:[\s-]?feira)?)/i,/(dia\s+\d{1,2})/i,/(\d{1,2}\/\d{1,2})/];
  for(const p of dr){const m=text.match(p);if(m){dt=m[1].trim();break;}}
  if(!dt){const dm=sl.match(/\b(segunda|terça|quarta|quinta|sexta|sábado|domingo)(?:[\s-]?feira)?\b/);if(dm)dt=dm[0];}
  let hr='';
  const tr=[/(\d{1,2}h\d{0,2})/i,/(\d{1,2}:\d{2})/,/(fim do dia)/i,/(durante o dia)/i];
  for(const p of tr){const m=text.match(p);if(m){hr=m[1].trim();break;}}
  let titulo=text.replace(/^[A-ZÀ-Úa-zà-ú\s]{2,20}(?:\s*:|(?=\s+pediu|\s+solicitou))\s*/i,'').replace(/pediu\s+(?:para|pra)\s*/i,'').replace(/para\s+(?:terça|segunda|quarta|quinta|sexta|sábado|domingo)[\s\S]*/i,'').replace(/até\s+(?:terça|segunda|quarta|quinta|sexta|sábado|domingo)[\s\S]*/i,'').replace(/prioridade\s+\w+/gi,'').replace(/urgente|asap/gi,'').replace(/durante o dia/gi,'').replace(/\s{2,}/g,' ').replace(/[,.\s]+$/,'').trim();
  if(titulo)titulo=titulo.charAt(0).toUpperCase()+titulo.slice(1);
  return{titulo,banker,data_texto:dt,hora_texto:hr,prioridade:priority};
}
 
// DATE/TIME
function interpDt(s){
  if(!s)return null;
  const n=s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[-–]/g,' ');
  const now=new Date(),td=now.getDay();
  const fmt=dt=>{const d=new Date(dt);return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;};
  const add=days=>{const d=new Date(now);d.setDate(d.getDate()+days);return fmt(d);};
  const ndow=t=>{const diff=(t-td+7)%7;return add(diff);};
  if(/\bhoje\b/.test(n))return fmt(now);
  if(/\bamanha\b/.test(n))return add(1);
  if(/depois de amanha/.test(n))return add(2);
  if(/fim de semana/.test(n))return ndow(6);
  if(/fim do mes/.test(n)){const l=new Date(now.getFullYear(),now.getMonth()+1,0);return fmt(l);}
  if(/semana que vem|proxima semana/.test(n))return add(7-td+1);
  if(/em (\d+) dias?/.test(n)){const m=n.match(/em (\d+) dias?/);return add(parseInt(m[1]));}
  const dm={'domingo':0,'dom':0,'segunda':1,'seg':1,'terca':2,'ter':2,'quarta':3,'qua':3,'quinta':4,'qui':4,'sexta':5,'sex':5,'sabado':6,'sab':6};
  for(const[k,v]of Object.entries(dm)){if(new RegExp(`\\b${k}\\b`).test(n))return ndow(v);}
  const dM=n.match(/dia\s+(\d{1,2})(?:[\/\-](\d{1,2}))?/);
  if(dM){const d=parseInt(dM[1]),m=dM[2]?parseInt(dM[2])-1:now.getMonth();let y=now.getFullYear();if(m<now.getMonth()||(m===now.getMonth()&&d<now.getDate()))y++;return fmt(new Date(y,m,d));}
  const sM=n.match(/(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{2,4}))?/);
  if(sM){const d=parseInt(sM[1]),m=parseInt(sM[2])-1;let y=sM[3]?parseInt(sM[3]):now.getFullYear();if(y<100)y+=2000;if(!sM[3]&&(m<now.getMonth()||(m===now.getMonth()&&d<now.getDate())))y++;return fmt(new Date(y,m,d));}
  return null;
}
function interpTm(s){
  if(!s)return null;
  const n=s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(/meio[\s-]?dia/.test(n))return'12:00';
  if(/fim do dia|eod/.test(n))return'18:00';
  if(/durante o dia|ao longo/.test(n))return'17:00';
  if(/manha/.test(n))return'09:00';
  if(/\btarde\b/.test(n))return'14:00';
  const hm=n.match(/(\d{1,2})h(\d{2})?/);if(hm)return`${pad(parseInt(hm[1]))}:${hm[2]||'00'}`;
  const col=n.match(/(\d{1,2}):(\d{2})/);if(col)return`${pad(parseInt(col[1]))}:${col[2]}`;
  return null;
}
const DOWS=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
function parseDt(v){
  const p=document.getElementById('dh'),h=document.getElementById('f-date');
  if(!v.trim()){p.textContent='';h.value='';return;}
  const r=interpDt(v);
  if(r){h.value=r;const[y,m,d]=r.split('-');const dow=new Date(`${r}T12:00:00`).getDay();p.textContent=`📅 ${d}/${m}/${y} (${DOWS[dow]})`;p.className='dh';}
  else{h.value='';p.textContent='Não entendi — tente: terça, 15/04, amanhã...';p.className='dh err';}
}
function parseTm(v){
  const p=document.getElementById('th'),h=document.getElementById('f-time');
  if(!v.trim()){p.textContent='';h.value='';return;}
  const r=interpTm(v);
  if(r){h.value=r;p.textContent=`🕐 ${r}`;p.className='dh';}
  else{h.value='';p.textContent='Tente: 17h, 17:30, fim do dia...';p.className='dh err';}
}
function clearIn(){
  document.getElementById('ai-text').value='';
  document.getElementById('ai-st').className='ai-st';
  document.getElementById('corr-box').className='corr-box';
  document.getElementById('main-btn').innerHTML='Corrigir e extrair ↗';
  document.getElementById('main-btn').disabled=false;
}
function addTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){alert('Informe o título.');return;}
  tasks.unshift({id:Date.now(),title,banker:document.getElementById('f-banker').value.trim(),date:document.getElementById('f-date').value,time:document.getElementById('f-time').value,priority:document.getElementById('f-priority').value,desc:document.getElementById('f-desc').value.trim(),done:false});
  save();clearFields();renderAll();switchTab('tasks');
}
function clearFields(){
  ['f-title','f-banker','f-date','f-time','f-date-text','f-time-text','f-desc'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('f-priority').value='mid';
  document.getElementById('dh').textContent='';document.getElementById('th').textContent='';
}
function toggleDone(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;save();renderAll();}}
function delTask(id){if(!confirm('Remover esta tarefa?'))return;tasks=tasks.filter(t=>t.id!==id);save();renderAll();}
function setF(f,btn){fil=f;document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTasks();}
function getFil(){
  if(fil==='pending')return tasks.filter(t=>!t.done);
  if(fil==='done')return tasks.filter(t=>t.done);
  if(fil==='today')return tasks.filter(t=>isTod(t)&&!t.done);
  if(fil==='overdue')return tasks.filter(t=>isOvd(t));
  return tasks;
}
function fmtD(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
function renderTL(el,list){
  if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-i">📋</div>Nenhuma tarefa aqui</div>`;return;}
  el.innerHTML=list.map(t=>{
    const pc=t.priority==='high'?'ph':t.priority==='low'?'pl':'pm';
    const tag=isOvd(t)?'<span class="tag-o">Atrasada</span>':isTod(t)&&!t.done?'<span class="tag-t">Hoje</span>':'';
    return`<div class="tc ${t.done?'done':''}">
      <div class="pdot ${pc}"></div>
      <div class="chk ${t.done?'checked':''}" onclick="toggleDone(${t.id})"></div>
      <div class="tbody">
        <div class="ttop"><span class="tname">${t.title}</span>${t.banker?`<span class="bpill">${t.banker}</span>`:''} ${tag}</div>
        <div class="tmeta">${t.date?`<span>📅 ${fmtD(t.date)}${t.time?' às '+t.time:''}</span>`:''}</div>
        ${t.desc?`<div class="tdesc">${t.desc}</div>`:''}
      </div>
      <button class="del-btn" onclick="delTask(${t.id})">✕</button>
    </div>`;
  }).join('');
}
function renderTasks(){const l=getFil();document.getElementById('lcnt').textContent=l.length+' itens';renderTL(document.getElementById('tlist'),l);}
function renderStats(){document.getElementById('s-total').textContent=tasks.length;document.getElementById('s-pend').textContent=tasks.filter(t=>!t.done).length;document.getElementById('s-done').textContent=tasks.filter(t=>t.done).length;document.getElementById('s-tod').textContent=tasks.filter(t=>isTod(t)&&!t.done).length;}
function renderCal(){
  const now=new Date();
  if(calY===undefined){calY=now.getFullYear();calM=now.getMonth();}
  const months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('cal-ml').textContent=`${months[calM]} ${calY}`;
  const first=new Date(calY,calM,1),last=new Date(calY,calM+1,0),tod=todayS();
  let html=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const addD=(y,m,d,om)=>{
    const ds=`${y}-${pad(m+1)}-${pad(d)}`;
    const dt=tasks.filter(t=>t.date===ds&&!t.done);
    const dots=dt.map(t=>{const c=t.priority==='high'?'#e03c3c':t.priority==='low'?'#1a8a5a':'#c97c1a';return`<div class="tdot" style="background:${c}"></div>`;}).join('');
    const cls=[om?'om':'',ds===tod?'today':'',selD===ds?'selected':''].filter(Boolean).join(' ');
    return`<div class="cal-day ${cls}" onclick="selDay('${ds}')"><div class="dn">${d}</div>${dots?`<div class="tdots">${dots}</div>`:''}</div>`;
  };
  for(let i=0;i<first.getDay();i++){const d=new Date(calY,calM,-(first.getDay()-1-i));html+=addD(d.getFullYear(),d.getMonth(),d.getDate(),true);}
  for(let d=1;d<=last.getDate();d++)html+=addD(calY,calM,d,false);
  const tot=first.getDay()+last.getDate(),rem=tot%7?7-tot%7:0;
  for(let i=1;i<=rem;i++)html+=addD(calY,calM+1,i,true);
  document.getElementById('cal-grid').innerHTML=html;
  renderCalDt();
}
function selDay(ds){selD=selD===ds?null:ds;renderCal();}
function renderCalDt(){
  const el=document.getElementById('cal-dt');
  if(!selD){el.innerHTML='';return;}
  const[y,m,d]=selD.split('-');
  el.innerHTML=`<h3>Demandas de ${d}/${m}/${y}</h3>`;
  const list=tasks.filter(t=>t.date===selD);
  const div=document.createElement('div');div.className='tlist';el.appendChild(div);
  renderTL(div,list.length?list:[]);
  if(!list.length)div.innerHTML=`<div class="empty">✅ Nenhuma demanda neste dia</div>`;
}
function chMonth(dir){calM+=dir;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}selD=null;renderCal();}
function renderAll(){renderTasks();renderStats();renderCal();}
function switchTab(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  document.querySelectorAll('.nav-item')[{input:0,tasks:1,calendar:2}[name]].classList.add('active');
  closeSidebar();
  const bn=document.getElementById('bn-'+name);if(bn)bn.classList.add('active');
}
 
function toggleSidebar(){
  const s=document.querySelector('.sidebar');
  const o=document.getElementById('sidebar-overlay');
  const open=s.classList.toggle('open');
  if(open){o.classList.add('show');}else{o.classList.remove('show');}
}
function closeSidebar(){
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}
</script>
</body>
</html>
